{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to PetGalaxy</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Outfit', sans-serif;
            background-color: #0b0914;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Animated Background Gradients */
        .bg-glow {
            position: absolute;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(0, 242, 254, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            top: -20vh;
            left: -20vw;
            animation: floatGlow 10s ease-in-out infinite alternate;
            z-index: 1;
        }

        .bg-glow-2 {
            position: absolute;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(79, 172, 254, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            bottom: -10vh;
            right: -10vw;
            animation: floatGlow2 8s ease-in-out infinite alternate;
            z-index: 1;
        }

        @keyframes floatGlow {
            0% {
                transform: translate(0, 0);
            }

            100% {
                transform: translate(5vw, 5vh);
            }
        }

        @keyframes floatGlow2 {
            0% {
                transform: translate(0, 0);
            }

            100% {
                transform: translate(-5vw, -5vh);
            }
        }

        .splash-container {
            z-index: 10;
            text-align: center;
            opacity: 0;
            transform: scale(0.9);
            animation: entrance 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes entrance {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .logo-icon {
            font-size: 5rem;
            color: #00f2fe;
            text-shadow: 0 0 30px rgba(0, 242, 254, 0.6);
            margin-bottom: 20px;
            animation: pulseIcon 2s infinite ease-in-out;
        }

        @keyframes pulseIcon {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }
        }

        .title {
            font-size: 4rem;
            font-weight: 800;
            color: #fff;
            margin: 0 0 10px 0;
            letter-spacing: -1px;
            background: linear-gradient(90deg, #00f2fe, #4facfe, #42e695);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            text-shadow: 0 5px 15px rgba(0, 242, 254, 0.2);
        }

        .subtitle {
            font-size: 1.5rem;
            color: #a0a5ba;
            font-weight: 300;
            margin-bottom: 40px;
            letter-spacing: 2px;
        }

        .loader-wrapper {
            width: 250px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.2);
        }

        .loader-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: linear-gradient(90deg, #00f2fe, #4facfe);
            width: 0%;
            border-radius: 4px;
            animation: load 2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            box-shadow: 0 0 10px #00f2fe;
        }

        @keyframes load {
            0% {
                width: 0%;
            }

            100% {
                width: 100%;
            }
        }

        .fade-out {
            animation: fadeOut 0.5s ease forwards;
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
                visibility: hidden;
            }
        }
    </style>
</head>

<body>
    <div class="bg-glow"></div>
    <div class="bg-glow-2"></div>

    <div class="splash-container" id="splash-content">
        <i class="fa-solid fa-paw logo-icon"></i>
        <h1 class="title">PetGalaxy</h1>
        <p class="subtitle">Everything Your Pets Need</p>
        <div class="loader-wrapper">
            <div class="loader-bar"></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const homeUrl = "{% url 'home' %}";

            // Wait for animation (2s) + small buffer (0.5s) then redirect
            setTimeout(() => {
                document.body.classList.add('fade-out');
                setTimeout(() => {
                    window.location.href = homeUrl;
                }, 500); // Wait for fade out to complete
            }, 2500);
        });
    </script>
</body>

</html>
